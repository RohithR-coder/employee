apiVersion: apps/v1
kind: Deployment
metadata:
  name: payslip-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payslip
  template:
    metadata:
      labels:
        app: payslip
    spec:
      containers:
      - name: payslip-container
        image: your-dockerhub-username/payslip-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: payslip-service
spec:
  type: NodePort
  selector:
    app: payslip
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
